<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKM - Skills Manager</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        sidebar: '#f8fafc',
                        surface: '#ffffff',
                        border: '#e2e8f0'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f1f5f9; color: #334155; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Markdown style simulation */
        .prose h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
        .prose h2 { font-size: 1.2em; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; }
        .prose p { margin-bottom: 0.8em; line-height: 1.5; }
        .prose code { background: #f1f5f9; padding: 0.1em 0.3em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .prose pre { background: #1e293b; color: #f8fafc; padding: 1em; border-radius: 6px; overflow-x: auto; font-family: monospace; font-size: 0.9em; margin-bottom: 1em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Mock Data ---
        const mockProviders = [
            { id: 'p1', name: 'Global Skills', type: 'global', path: '~/.agents/skills', enabled: true, priority: 1, lastScan: '10 mins ago', status: 'success' },
            { id: 'p2', name: 'Frontend Workspace', type: 'workspace', path: '/Users/dev/projects/skm/skills', enabled: true, priority: 2, lastScan: '2 mins ago', status: 'success' },
            { id: 'p3', name: 'Cursor AI', type: 'cursor', path: '~/.cursor/skills', enabled: false, priority: 3, lastScan: '1 day ago', status: 'success' },
        ];

        const mockSkills = [
            { id: 's1', name: 'code_reviewer', providerId: 'p1', path: '~/.agents/skills/code_reviewer', category: 'Development', status: 'active', hasConflict: false, summary: 'Reviews code for best practices and bugs.' },
            { id: 's2', name: 'generate_tests', providerId: 'p2', path: '/Users/dev/projects/skm/skills/generate_tests', category: 'Testing', status: 'active', hasConflict: false, summary: 'Generates unit tests for a given file.' },
            { id: 's3', name: 'git_commit_helper', providerId: 'p1', path: '~/.agents/skills/git_commit_helper', category: 'VCS', status: 'active', hasConflict: false, summary: 'Analyzes diff and suggests commit messages.' },
            { id: 's4', name: 'sql_optimizer', providerId: 'p1', path: '~/.agents/skills/sql_optimizer', category: 'Database', status: 'conflict', hasConflict: true, summary: 'Optimizes slow SQL queries.' },
            { id: 's5', name: 'sql_optimizer', providerId: 'p2', path: '/Users/dev/projects/skm/skills/sql_optimizer', category: 'Database', status: 'conflict', hasConflict: true, summary: 'Optimizes slow SQL queries.' },
            { id: 's6', name: 'doc_generator', providerId: 'p2', path: '/Users/dev/projects/skm/skills/doc_generator', category: 'Documentation', status: 'error', hasConflict: false, summary: 'Generates markdown docs from code.' }
        ];

        const mockIssues = [
            { id: 'i1', type: 'conflict', message: '同名 Skill 在多个 Provider 中存在', detail: 'sql_optimizer 出现在 Global Skills 和 Frontend Workspace 中。目前优先使用 Global Skills。', target: 'sql_optimizer' },
            { id: 'i2', type: 'error', message: '缺少 SKILL.md 文件', detail: '目录非空，但未找到入口文件', target: '/Users/dev/projects/skm/skills/broken_skill' },
            { id: 'i3', type: 'error', message: 'Frontmatter 解析失败', detail: 'yaml 格式错误 (Line 3)', target: '/Users/dev/projects/skm/skills/doc_generator' },
        ];

        const fileTreeData = [
            { name: 'SKILL.md', type: 'file', icon: 'fa-markdown', color: 'text-blue-500' },
            { name: 'assets', type: 'folder', icon: 'fa-folder', color: 'text-yellow-400', children: [
                { name: 'prompt_v1.txt', type: 'file', icon: 'fa-file-lines', color: 'text-gray-400' },
                { name: 'logo.png', type: 'file', icon: 'fa-image', color: 'text-purple-400' }
            ]},
            { name: 'scripts', type: 'folder', icon: 'fa-folder', color: 'text-yellow-400', children: [
                { name: 'run.sh', type: 'file', icon: 'fa-file-code', color: 'text-green-500' }
            ]}
        ];

        // --- Components ---

        const Badge = ({ children, color = 'gray' }) => {
            const colorMap = {
                gray: 'bg-gray-100 text-gray-700 border-gray-200',
                green: 'bg-green-50 text-green-700 border-green-200',
                blue: 'bg-blue-50 text-blue-700 border-blue-200',
                red: 'bg-red-50 text-red-700 border-red-200',
                yellow: 'bg-yellow-50 text-yellow-700 border-yellow-200',
            };
            return (
                <span className={`px-2 py-0.5 text-xs rounded border ${colorMap[color] || colorMap.gray}`}>
                    {children}
                </span>
            );
        };

        const IconButton = ({ icon, onClick, title, danger }) => (
            <button 
                onClick={onClick} 
                title={title}
                className={`w-7 h-7 flex items-center justify-center rounded transition-colors ${danger ? 'text-red-500 hover:bg-red-50' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-800'}`}
            >
                <i className={`fa-solid ${icon} text-sm`}></i>
            </button>
        );

        // --- Views ---

        const DashboardView = () => (
            <div className="space-y-4">
                <h2 className="text-lg font-semibold text-gray-800 mb-4">系统概览</h2>
                <div className="grid grid-cols-4 gap-4">
                    <div className="bg-white p-4 rounded-md border border-gray-200 shadow-sm">
                        <div className="text-gray-500 text-xs font-medium uppercase tracking-wider mb-1">总 Skills</div>
                        <div className="text-2xl font-bold text-gray-800">{mockSkills.length}</div>
                    </div>
                    <div className="bg-white p-4 rounded-md border border-gray-200 shadow-sm">
                        <div className="text-gray-500 text-xs font-medium uppercase tracking-wider mb-1">Providers</div>
                        <div className="text-2xl font-bold text-gray-800">{mockProviders.length}</div>
                    </div>
                    <div className="bg-white p-4 rounded-md border border-gray-200 shadow-sm">
                        <div className="text-gray-500 text-xs font-medium uppercase tracking-wider mb-1">冲突项</div>
                        <div className="text-2xl font-bold text-yellow-600">1</div>
                    </div>
                    <div className="bg-white p-4 rounded-md border border-gray-200 shadow-sm">
                        <div className="text-gray-500 text-xs font-medium uppercase tracking-wider mb-1">异常数</div>
                        <div className="text-2xl font-bold text-red-600">2</div>
                    </div>
                </div>

                <div className="bg-white border border-gray-200 rounded-md shadow-sm mt-6">
                    <div className="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-md">
                        <h3 className="text-sm font-semibold text-gray-700">最近扫描动态</h3>
                        <span className="text-xs text-gray-500">2 分钟前</span>
                    </div>
                    <div className="p-4">
                        <ul className="space-y-3 text-sm">
                            <li className="flex items-start gap-3 text-gray-600">
                                <i className="fa-solid fa-check-circle text-green-500 mt-0.5"></i>
                                <div>
                                    <span className="font-medium text-gray-800">Frontend Workspace</span> 扫描完成。新增 1 个，变更 0 个。耗时 120ms。
                                </div>
                            </li>
                            <li className="flex items-start gap-3 text-gray-600">
                                <i className="fa-solid fa-triangle-exclamation text-yellow-500 mt-0.5"></i>
                                <div>
                                    检测到冲突：<code>sql_optimizer</code> 在多个 Provider 中存在。
                                </div>
                            </li>
                            <li className="flex items-start gap-3 text-gray-600">
                                <i className="fa-solid fa-circle-xmark text-red-500 mt-0.5"></i>
                                <div>
                                    解析失败：<code>doc_generator</code> 的 SKILL.md Frontmatter 格式不合法。
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        );

        const ProvidersView = () => (
            <div className="space-y-4 h-full flex flex-col">
                <div className="flex justify-between items-center mb-2">
                    <h2 className="text-lg font-semibold text-gray-800">Providers 管理</h2>
                    <button className="bg-primary text-white px-3 py-1.5 rounded text-sm font-medium hover:bg-blue-700 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-plus"></i> 新增 Provider
                    </button>
                </div>
                
                <div className="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden flex-1">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-gray-50 border-b border-gray-200 text-gray-600">
                            <tr>
                                <th className="px-4 py-2 font-medium w-10">启/停</th>
                                <th className="px-4 py-2 font-medium">名称</th>
                                <th className="px-4 py-2 font-medium">根目录路径</th>
                                <th className="px-4 py-2 font-medium">类型</th>
                                <th className="px-4 py-2 font-medium w-24">优先级</th>
                                <th className="px-4 py-2 font-medium w-32">最近扫描</th>
                                <th className="px-4 py-2 font-medium text-right w-24">操作</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {mockProviders.map(p => (
                                <tr key={p.id} className="hover:bg-gray-50 transition-colors">
                                    <td className="px-4 py-2 text-center">
                                        <input type="checkbox" defaultChecked={p.enabled} className="w-3.5 h-3.5 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer"/>
                                    </td>
                                    <td className="px-4 py-2 font-medium text-gray-800 flex items-center gap-2">
                                        <i className="fa-solid fa-hard-drive text-gray-400"></i> {p.name}
                                    </td>
                                    <td className="px-4 py-2 text-gray-500 font-mono text-xs">{p.path}</td>
                                    <td className="px-4 py-2"><Badge color="gray">{p.type}</Badge></td>
                                    <td className="px-4 py-2 text-center">{p.priority}</td>
                                    <td className="px-4 py-2 text-gray-500 text-xs">
                                        {p.status === 'success' && <i className="fa-solid fa-check text-green-500 mr-1"></i>}
                                        {p.lastScan}
                                    </td>
                                    <td className="px-4 py-2 text-right space-x-1">
                                        <button className="text-gray-400 hover:text-primary transition-colors px-1" title="重新扫描"><i className="fa-solid fa-rotate-right"></i></button>
                                        <button className="text-gray-400 hover:text-gray-700 transition-colors px-1" title="编辑"><i className="fa-solid fa-pen"></i></button>
                                        <button className="text-gray-400 hover:text-red-500 transition-colors px-1" title="删除"><i className="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const SkillsView = ({ onSelectSkill }) => {
            const [search, setSearch] = useState('');
            const [filterProvider, setFilterProvider] = useState('all');

            const filteredSkills = mockSkills.filter(s => {
                const matchSearch = s.name.toLowerCase().includes(search.toLowerCase());
                const matchProvider = filterProvider === 'all' || s.providerId === filterProvider;
                return matchSearch && matchProvider;
            });

            return (
                <div className="flex flex-col h-full space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className="text-lg font-semibold text-gray-800">Skills 目录</h2>
                        
                        <div className="flex gap-2">
                            <div className="relative">
                                <i className="fa-solid fa-search absolute left-2.5 top-2 text-gray-400 text-sm"></i>
                                <input 
                                    type="text" 
                                    placeholder="搜索 Skill..." 
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    className="pl-8 pr-3 py-1.5 border border-gray-300 rounded text-sm w-64 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"
                                />
                            </div>
                            <select 
                                className="border border-gray-300 rounded px-2 py-1.5 text-sm bg-white text-gray-700 focus:outline-none focus:border-primary"
                                value={filterProvider}
                                onChange={e => setFilterProvider(e.target.value)}
                            >
                                <option value="all">所有 Providers</option>
                                {mockProviders.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden flex-1 overflow-y-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-gray-50 border-b border-gray-200 text-gray-600 sticky top-0">
                                <tr>
                                    <th className="px-4 py-2 font-medium">Skill 名称</th>
                                    <th className="px-4 py-2 font-medium">Provider</th>
                                    <th className="px-4 py-2 font-medium">分类</th>
                                    <th className="px-4 py-2 font-medium w-24">状态</th>
                                    <th className="px-4 py-2 font-medium text-right w-20">操作</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {filteredSkills.map(s => {
                                    const provider = mockProviders.find(p => p.id === s.providerId);
                                    let statusBadge = <Badge color="green">Active</Badge>;
                                    if (s.status === 'conflict') statusBadge = <Badge color="yellow">Conflict</Badge>;
                                    if (s.status === 'error') statusBadge = <Badge color="red">Error</Badge>;

                                    return (
                                        <tr key={s.id} onClick={() => onSelectSkill(s)} className="hover:bg-blue-50 transition-colors cursor-pointer group">
                                            <td className="px-4 py-2 font-medium text-gray-800 flex items-center gap-2">
                                                <i className="fa-solid fa-cube text-primary/70"></i>
                                                {s.name}
                                            </td>
                                            <td className="px-4 py-2 text-gray-600">{provider?.name}</td>
                                            <td className="px-4 py-2"><span className="text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded text-xs">{s.category}</span></td>
                                            <td className="px-4 py-2">{statusBadge}</td>
                                            <td className="px-4 py-2 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button className="text-gray-400 hover:text-primary transition-colors" title="查看详情">
                                                    <i className="fa-solid fa-chevron-right"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                                {filteredSkills.length === 0 && (
                                    <tr>
                                        <td colSpan="5" className="px-4 py-8 text-center text-gray-500">没有找到匹配的 Skills</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const SkillDetailView = ({ skill, onClose }) => {
            if (!skill) return null;
            const provider = mockProviders.find(p => p.id === skill.providerId);

            const FileTreeNode = ({ node, indent = 0 }) => (
                <div className="text-sm">
                    <div className={`flex items-center gap-2 py-1 px-2 hover:bg-gray-100 rounded cursor-pointer ${indent > 0 ? 'ml-4' : ''}`}>
                        <i className={`fa-solid ${node.icon} ${node.color} w-4 text-center`}></i>
                        <span className="text-gray-700 font-mono text-xs">{node.name}</span>
                    </div>
                    {node.children && node.children.map((child, i) => (
                        <FileTreeNode key={i} node={child} indent={indent + 1} />
                    ))}
                </div>
            );

            return (
                <div className="flex flex-col h-full bg-white rounded-md border border-gray-200 shadow-sm overflow-hidden animate-fade-in relative">
                    {/* Header */}
                    <div className="border-b border-gray-200 px-4 py-3 bg-gray-50 flex justify-between items-start">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <h2 className="text-lg font-bold text-gray-800"><i className="fa-solid fa-cube text-primary mr-1"></i>{skill.name}</h2>
                                {skill.status === 'conflict' && <Badge color="yellow">存在冲突</Badge>}
                                {skill.status === 'error' && <Badge color="red">异常</Badge>}
                            </div>
                            <div className="text-xs text-gray-500 font-mono truncate max-w-xl" title={skill.path}>
                                {skill.path}
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button className="text-gray-500 hover:text-primary border border-gray-200 bg-white px-2 py-1 rounded text-xs shadow-sm flex items-center gap-1 transition-colors">
                                <i className="fa-solid fa-folder-open"></i> 打开目录
                            </button>
                            <IconButton icon="fa-xmark" onClick={onClose} title="关闭" />
                        </div>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Left sidebar: File Tree & Info */}
                        <div className="w-64 border-r border-gray-200 bg-sidebar flex flex-col">
                            <div className="p-3 border-b border-gray-200">
                                <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">属性</h3>
                                <div className="space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">Provider:</span>
                                        <span className="font-medium text-gray-700">{provider?.name}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-500">分类:</span>
                                        <span className="font-medium text-gray-700">{skill.category}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="p-3 flex-1 overflow-y-auto scrollbar-hide">
                                <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">目录结构</h3>
                                <div className="mt-1">
                                    {fileTreeData.map((node, i) => <FileTreeNode key={i} node={node} />)}
                                </div>
                            </div>
                        </div>

                        {/* Right content: SKILL.md Preview */}
                        <div className="flex-1 flex flex-col bg-white overflow-hidden">
                            <div className="bg-gray-100 border-b border-gray-200 px-3 py-1.5 flex items-center gap-4 text-xs font-mono text-gray-600">
                                <span className="flex items-center gap-1"><i className="fa-solid fa-markdown text-blue-500"></i> SKILL.md</span>
                                <span className="text-gray-400">|</span>
                                <span className="text-green-600">✓ Frontmatter Parsed</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-6 prose max-w-none text-sm">
                                <h1>{skill.name}</h1>
                                <p>{skill.summary}</p>
                                
                                <h2>Frontmatter</h2>
                                <pre><code>name: {skill.name}
category: {skill.category}
version: 1.0.0
author: Developer
description: "{skill.summary}"</code></pre>

                                <h2>Instructions</h2>
                                <p>当触发此 skill 时，请遵循以下规则：</p>
                                <ul>
                                    <li>检查所有输入文件的合法性。</li>
                                    <li>参考 <code>assets/prompt_v1.txt</code> 中的上下文。</li>
                                    <li>输出格式必须符合项目规范。</li>
                                </ul>

                                <h2>Execution</h2>
                                <p>可通过执行 <code>scripts/run.sh</code> 来运行本地辅助脚本。</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const IssuesView = () => (
            <div className="space-y-4 h-full flex flex-col">
                <div className="flex justify-between items-center mb-2">
                    <h2 className="text-lg font-semibold text-gray-800">异常与冲突检测</h2>
                    <button className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded text-sm hover:bg-gray-50 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-shield-halved"></i> 重新检测
                    </button>
                </div>

                <div className="bg-white border border-gray-200 rounded-md shadow-sm overflow-hidden flex-1">
                    <table className="w-full text-left text-sm">
                        <thead className="bg-gray-50 border-b border-gray-200 text-gray-600">
                            <tr>
                                <th className="px-4 py-2 font-medium w-24">类型</th>
                                <th className="px-4 py-2 font-medium">目标对象/路径</th>
                                <th className="px-4 py-2 font-medium">问题描述</th>
                                <th className="px-4 py-2 font-medium text-right w-24">操作</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                            {mockIssues.map(issue => (
                                <tr key={issue.id} className="hover:bg-gray-50 transition-colors">
                                    <td className="px-4 py-2">
                                        {issue.type === 'conflict' ? <Badge color="yellow">Conflict</Badge> : <Badge color="red">Error</Badge>}
                                    </td>
                                    <td className="px-4 py-2 font-mono text-xs text-gray-700">{issue.target}</td>
                                    <td className="px-4 py-2">
                                        <div className="font-medium text-gray-800">{issue.message}</div>
                                        <div className="text-xs text-gray-500 mt-0.5">{issue.detail}</div>
                                    </td>
                                    <td className="px-4 py-2 text-right">
                                        <button className="text-primary hover:underline text-xs">查看</button>
                                    </td>
                                </tr>
                            ))}
                            {mockIssues.length === 0 && (
                                <tr>
                                    <td colSpan="4" className="px-4 py-8 text-center text-gray-500">当前没有异常或冲突</td>
                                </tr>
                            )}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        // --- Layout ---

        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard'); // dashboard, providers, skills, issues
            const [selectedSkill, setSelectedSkill] = useState(null);

            const navigation = [
                { id: 'dashboard', name: 'Dashboard', icon: 'fa-chart-pie' },
                { id: 'skills', name: 'Skills 目录', icon: 'fa-cubes' },
                { id: 'providers', name: 'Providers', icon: 'fa-hard-drive' },
                { id: 'issues', name: '异常检测', icon: 'fa-triangle-exclamation', badge: '3' },
            ];

            return (
                <div className="flex h-screen bg-[#f1f5f9] overflow-hidden selection:bg-blue-100 selection:text-blue-900">
                    {/* Sidebar */}
                    <div className="w-56 bg-sidebar border-r border-border flex flex-col justify-between">
                        <div>
                            <div className="h-14 flex items-center px-4 border-b border-border bg-white">
                                <i className="fa-solid fa-layer-group text-primary text-xl mr-2"></i>
                                <span className="font-bold text-gray-800 tracking-tight text-lg">SKM</span>
                            </div>
                            <div className="p-3 space-y-1">
                                {navigation.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setCurrentView(item.id); setSelectedSkill(null); }}
                                        className={`w-full flex items-center justify-between px-3 py-2 text-sm rounded-md transition-colors ${
                                            currentView === item.id 
                                            ? 'bg-blue-50 text-primary font-medium' 
                                            : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900'
                                        }`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <i className={`fa-solid ${item.icon} w-4 text-center ${currentView === item.id ? 'text-primary' : 'text-gray-400'}`}></i>
                                            {item.name}
                                        </div>
                                        {item.badge && (
                                            <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${currentView === item.id ? 'bg-blue-200 text-blue-800' : 'bg-gray-200 text-gray-600'}`}>
                                                {item.badge}
                                            </span>
                                        )}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="p-4 border-t border-border text-xs text-gray-400 flex justify-between items-center">
                            <span>v0.1.0-draft</span>
                            <i className="fa-solid fa-gear hover:text-gray-600 cursor-pointer transition-colors" title="Settings"></i>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col relative">
                        {/* Header */}
                        <header className="h-14 bg-white border-b border-border flex items-center justify-between px-6 z-10">
                            <h1 className="text-sm font-medium text-gray-700 capitalize">
                                {currentView === 'dashboard' && '系统大盘'}
                                {currentView === 'skills' && (selectedSkill ? `Skills / ${selectedSkill.name}` : '本地 Skills 库')}
                                {currentView === 'providers' && '本地 Provider 配置'}
                                {currentView === 'issues' && '冲突与格式异常'}
                            </h1>
                            <div className="flex items-center gap-3">
                                <span className="text-xs text-gray-400 flex items-center gap-1">
                                    <span className="w-2 h-2 rounded-full bg-green-500 inline-block"></span> 监听中
                                </span>
                                <div className="h-4 w-px bg-gray-200 mx-1"></div>
                                <button className="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded text-xs font-medium hover:bg-gray-50 flex items-center gap-1.5 transition-colors shadow-sm" title="重新扫描所有目录">
                                    <i className="fa-solid fa-radar text-primary"></i> 全局扫描
                                </button>
                            </div>
                        </header>

                        {/* Content Area */}
                        <main className="flex-1 overflow-auto p-6 relative">
                            {!selectedSkill && currentView === 'dashboard' && <DashboardView />}
                            {!selectedSkill && currentView === 'providers' && <ProvidersView />}
                            {!selectedSkill && currentView === 'skills' && <SkillsView onSelectSkill={setSelectedSkill} />}
                            {!selectedSkill && currentView === 'issues' && <IssuesView />}
                            
                            {/* Skill Detail Overlay / View */}
                            {selectedSkill && (
                                <div className="absolute inset-4 z-20">
                                    <SkillDetailView skill={selectedSkill} onClose={() => setSelectedSkill(null)} />
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Optional: Add custom fade-in animation for modal transitions */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</body>
</html>
